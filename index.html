<style>
  :root{
    --display:"Helvetica Neue",Helvetica,Arial,"Arimo","Liberation Sans",sans-serif;
    --body:"Inter",system-ui,-apple-system,sans-serif;
    --util:"Roboto Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --paper:#f8f6f1;--surface:#ffffff;--ink:#1a1a1a;--ink-soft:#55555d;--muted:#8c8c92;
    --line:#e7e3da;--line-soft:#efece4;--violet:#5500ff;
    --r:6px;--r-lg:10px;
    --shadow-soft:0 1px 2px rgba(26,26,34,.03), 0 10px 28px -18px rgba(26,26,34,.14);
    --shadow-card:0 1px 2px rgba(26,26,34,.04), 0 18px 40px -22px rgba(26,26,34,.22);
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);font-family:var(--body);
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}
  a{color:inherit;text-decoration:none;}
  svg{display:block;}
  :focus-visible{outline:2px solid var(--violet);outline-offset:3px;border-radius:var(--r);}
  .bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .bg svg{width:100%;height:100%;}
  .hub{position:relative;z-index:1;flex:1;width:100%;max-width:840px;margin:0 auto;
    padding:56px 24px;display:flex;flex-direction:column;justify-content:center;}
  .logo{height:30px;width:auto;margin:0 0 38px;}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--util);font-size:11px;
    font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:0 0 30px;}
  .spark{width:13px;height:13px;flex:0 0 auto;}
  h1{font-family:var(--display);font-weight:700;font-size:clamp(2rem,5vw,2.8rem);letter-spacing:-0.025em;
    line-height:1.02;margin:0 0 12px;}
  .sub{font-size:1.05rem;color:var(--ink-soft);margin:0 0 42px;max-width:48ch;line-height:1.55;}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .card{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--r-lg);padding:26px;box-shadow:var(--shadow-soft);min-height:208px;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;}
  .card-ico{width:36px;height:36px;border-radius:var(--r);background:var(--paper);
    border:1px solid var(--line-soft);display:flex;align-items:center;justify-content:center;
    color:var(--ink);margin-bottom:20px;}
  .card-ico svg{width:18px;height:18px;}
  .card-title{font-family:var(--display);font-weight:700;font-size:1.35rem;letter-spacing:-0.015em;margin:0 0 8px;}
  .card-desc{font-size:14.5px;color:var(--ink-soft);line-height:1.5;margin:0;}
  .card-open{margin-top:auto;padding-top:22px;display:inline-flex;align-items:center;gap:7px;
    font-family:var(--util);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);}
  .card-open .arr{transition:transform .18s ease;}
  .hub-foot{font-family:var(--util);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--muted);margin-top:46px;}
  @media (hover:hover){
    .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-card);border-color:var(--line);}
    .card:hover .arr{transform:translateX(3px);}
  }
  @media (max-width:620px){
    .cards{grid-template-columns:1fr;}
    .hub{padding:40px 20px;justify-content:flex-start;}
    .card{min-height:0;}
  }
</style>
</head>
